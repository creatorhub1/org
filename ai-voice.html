<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>CreatorHub AI Voiceنيست</title>
<style>
body{
  font-family: Arial;
  background: linear-gradient(135deg,#5D4037,#9b59b6);
  color:white;
  text-align:center;
  padding:40px;
}
textarea{
  width:80%;
  height:120px;
  padding:10px;
  border-radius:10px;
  border:none;
  font-size:16px;
}
select, button{
  margin:15px;
  padding:10px 20px;
  border-radius:8px;
  border:none;
  font-size:16px;
  cursor:pointer;
}
button{
  background:#6c5ce7;
  color:white;
}
button:hover{
  background:#8e7dff;
}
a{
  display:none;
  color:#fff;
  margin-top:10px;
  text-decoration:none;
  padding:10px 20px;
  background:#00b894;
  border-radius:8px;
}
a:hover{
  background:#55efc4;
}
</style>
</head>
<body>

<h1>🎤 CreatorHub AI Voiceتيست</h1>

<textarea id="text" placeholder="اكتب النص هنا..."></textarea>
<br>

<select id="voice">
  <option value="EXAVITQu4vr4xnSDxMaL">رجل</option>
  <option value="21m00Tcm4TlvDq8ikWAM">امرأة</option>
  <option value="TxGEqnHWrfWFTfGW9XjX">ولد صغير</option>
  <option value="AZnzlk1XvdvUeBnXmlld">بنت صغيرة</option>
  <option value="ErXwobaYiN019PkySvjV">سنجاب 🐿️</option>
</select>
<br>

<button onclick="generate()">تحويل إلى صوت</button>

<br><br>
<a id="download" download="voice.mp3">⬇️ تحميل MP3</a>

<script>
async function generate(){
  const text = document.getElementById("text").value;
  const voiceId = document.getElementById("voice").value;

  if(!text){
    alert("اكتب النص أولاً");
    return;
  }

  // ⚠️ ملاحظة: المفتاح موجود هنا مباشرة → غير آمن
  const apiKey = "61ae7a17a7964869b92fc3c9ba042ff9";

  try{
    const response = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${voiceId}`,{
      method: "POST",
      headers:{
        "Content-Type": "application/json",
        "xi-api-key": apiKey
      },
      body: JSON.stringify({
        text,
        model_id: "eleven_multilingual_v2"
      })
    });

    if(!response.ok){
      const errorText = await response.text();
      alert("حدث خطأ: " + errorText);
      return;
    }

    const blob = await response.blob();
    const url = URL.createObjectURL(blob);

    // تشغيل الصوت مباشرة
    const audio = new Audio(url);
    audio.play();

    // عرض زر التحميل
    const link = document.getElementById("download");
    link.href = url;
    link.style.display = "inline";

  } catch(err){
    alert("خطأ في الاتصال: " + err.message);
    console.error(err);
  }
}
</script>

</body>
</html>
