<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>AI Voice</title>

<style>
body{
font-family: Arial;
background:#111;
color:white;
text-align:center;
padding:40px;
}

textarea{
width:80%;
height:120px;
padding:10px;
border-radius:10px;
border:none;
font-size:16px;
}

select,input{
margin:10px;
padding:10px;
border-radius:8px;
border:none;
}

button{
background:#6c5ce7;
color:white;
padding:12px 25px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#8e7dff;
}
</style>
</head>

<body>

<h1>🎤 AI Voice</h1>

<textarea id="text" placeholder="اكتب النص هنا..."></textarea>

<br>

<select id="voiceType">
<option value="man">رجل</option>
<option value="woman">امرأة</option>
<option value="girl">بنت صغيرة</option>
<option value="boy">ولد صغير</option>
<option value="chipmunk">سنجاب 🐿️</option>
</select>

<br>

<label>سرعة الصوت</label><br>
<input type="range" id="speed" min="0.5" max="2" step="0.1" value="1">

<br><br>

<button onclick="speak()">تشغيل الصوت</button>

<script>

function speak(){

let text=document.getElementById("text").value;
let type=document.getElementById("voiceType").value;
let speed=document.getElementById("speed").value;

let speech=new SpeechSynthesisUtterance(text);

let voices=speechSynthesis.getVoices();

if(type=="man"){
speech.voice=voices.find(v=>v.name.toLowerCase().includes("male")) || voices[0];
speech.pitch=1;
}

if(type=="woman"){
speech.voice=voices.find(v=>v.name.toLowerCase().includes("female")) || voices[1];
speech.pitch=1.2;
}

if(type=="girl"){
speech.pitch=1.6;
}

if(type=="boy"){
speech.pitch=1.3;
}

if(type=="chipmunk"){
speech.pitch=2;
speed=1.7;
}

speech.rate=speed;

speechSynthesis.speak(speech);

}

</script>

</body>
</html>
