<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Voice | CreatorHub</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{box-sizing:border-box;margin:0;padding:0;}

body{
font-family:'Cairo',sans-serif;
background:#f5f5f7;
display:flex;
flex-direction:column;
min-height:100vh;
}

header{
background:linear-gradient(90deg,#6a1b9a,#ab47bc);
color:white;
padding:25px;
text-align:center;
}

.main{
flex:1;
display:flex;
justify-content:center;
align-items:center;
padding:40px 20px;
}

.voice-card{
background:white;
width:100%;
max-width:700px;
border-radius:20px;
padding:35px;
box-shadow:0 15px 35px rgba(0,0,0,0.1);
}

textarea{
width:100%;
height:150px;
border-radius:12px;
border:1px solid #ddd;
padding:12px;
font-size:1rem;
font-family:'Cairo';
resize:none;
outline:none;
}

textarea:focus{
border-color:#6a1b9a;
}

button{
margin-top:20px;
border:none;
padding:14px 25px;
border-radius:30px;
background:#6a1b9a;
color:white;
font-weight:600;
cursor:pointer;
font-size:1rem;
}

button:hover{
background:#4a0d7a;
}

.player-box{
margin-top:25px;
padding:15px;
background:#fafafa;
border-radius:12px;
border:1px solid #eee;
}

audio{
width:100%;
}

footer{
background:#6a1b9a;
color:white;
text-align:center;
padding:18px;
font-size:0.9rem;
}

</style>
</head>

<body>

<header>
<h1>AI Voice</h1>
<p>حوّل النص إلى صوت طبيعي</p>
</header>

<div class="main">

<div class="voice-card">

<textarea id="textInput" placeholder="اكتب النص هنا..."></textarea>

<button onclick="generateVoice()">🎙 تحويل إلى صوت</button>

<div class="player-box">
<audio id="audioPlayer" controls></audio>
</div>

</div>

</div>

<footer>
&copy; 2026 CreatorHub. جميع الحقوق محفوظة.
</footer>

<script>

function generateVoice(){

const text=document.getElementById("textInput").value;

if(!text){
alert("اكتب النص أولاً");
return;
}

let utterance=new SpeechSynthesisUtterance(text);

const voices=speechSynthesis.getVoices();
let arabicVoice=voices.find(v=>v.lang.includes("ar"));

if(arabicVoice){
utterance.voice=arabicVoice;
}

utterance.lang="ar-SA";

speechSynthesis.cancel();
speechSynthesis.speak(utterance);

}

</script>

</body>
</html>
