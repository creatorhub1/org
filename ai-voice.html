<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Voice | CreatorHub</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{box-sizing:border-box;margin:0;padding:0;}

body{
font-family:'Cairo',sans-serif;
background:#f5f5f7;
display:flex;
flex-direction:column;
min-height:100vh;
}

header{
background:linear-gradient(90deg,#6a1b9a,#ab47bc);
color:white;
padding:25px;
text-align:center;
}

.main{
flex:1;
display:flex;
justify-content:center;
align-items:center;
padding:40px 20px;
}

.voice-card{
background:white;
width:100%;
max-width:700px;
border-radius:20px;
padding:35px;
box-shadow:0 15px 35px rgba(0,0,0,0.1);
}

textarea{
width:100%;
height:140px;
border-radius:12px;
border:1px solid #ddd;
padding:12px;
font-size:1rem;
font-family:'Cairo';
resize:none;
}

.buttons{
display:flex;
gap:10px;
margin-top:20px;
flex-wrap:wrap;
}

button{
border:none;
padding:12px 20px;
border-radius:25px;
font-weight:600;
cursor:pointer;
}

.listen{background:#6a1b9a;color:white;}
.convert{background:#009688;color:white;}

.player-box{
margin-top:25px;
padding:15px;
background:#fafafa;
border-radius:12px;
border:1px solid #eee;
}

audio{width:100%;}

footer{
background:#6a1b9a;
color:white;
text-align:center;
padding:18px;
}

</style>
</head>

<body>

<header>
<h1>AI Voice</h1>
<p>حوّل النص إلى صوت طبيعي بسرعة</p>
</header>

<div class="main">

<div class="voice-card">

<textarea id="textInput" placeholder="اكتب النص هنا..."></textarea>

<div class="buttons">
<button class="listen" onclick="listenVoice()">🔊 سمع</button>
<button class="convert" onclick="convertAudio()">🎧 تحويل إلى Audio</button>
</div>

<div class="player-box">
<audio id="audioPlayer" controls></audio>
</div>

</div>

</div>

<footer>
&copy; 2026 CreatorHub. جميع الحقوق محفوظة.
</footer>

<script>

let mediaRecorder;
let chunks=[];

function getArabicVoice(){
const voices=speechSynthesis.getVoices();
return voices.find(v=>v.lang.includes("ar"))||voices[0];
}

/* تشغيل الصوت فقط */

function listenVoice(){

const text=document.getElementById("textInput").value;

if(!text){alert("اكتب نص");return;}

let utterance=new SpeechSynthesisUtterance(text);
utterance.voice=getArabicVoice();
utterance.lang="ar-SA";

speechSynthesis.cancel();
speechSynthesis.speak(utterance);

}

/* تحويل إلى ملف صوتي */

async function convertAudio(){

const text=document.getElementById("textInput").value;

if(!text){alert("اكتب نص");return;}

const stream=await navigator.mediaDevices.getUserMedia({audio:true});

mediaRecorder=new MediaRecorder(stream);

chunks=[];

mediaRecorder.ondataavailable=e=>{
chunks.push(e.data);
};

mediaRecorder.onstop=e=>{

const blob=new Blob(chunks,{type:"audio/webm"});
const url=URL.createObjectURL(blob);

const audio=document.getElementById("audioPlayer");
audio.src=url;

};

mediaRecorder.start();

let utterance=new SpeechSynthesisUtterance(text);
utterance.voice=getArabicVoice();
utterance.lang="ar-SA";

speechSynthesis.speak(utterance);

utterance.onend=()=>{
mediaRecorder.stop();
};

}

</script>

</body>
</html>
