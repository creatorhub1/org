<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Voice | CreatorHub</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:'Cairo',sans-serif;
background:#f5f5f7;
display:flex;
flex-direction:column;
min-height:100vh;
}

/* HEADER */

header{
background:linear-gradient(90deg,#6a1b9a,#ab47bc);
color:white;
padding:25px;
text-align:center;
}

header h1{
font-size:2rem;
margin-bottom:5px;
}

header p{
opacity:0.9;
font-size:0.95rem;
}

/* MAIN */

.main{
flex:1;
display:flex;
justify-content:center;
align-items:center;
padding:40px 20px;
}

/* CARD */

.voice-card{
background:white;
width:100%;
max-width:700px;
border-radius:20px;
padding:35px;
box-shadow:0 15px 35px rgba(0,0,0,0.1);
}

/* TITLE */

.tool-title{
font-size:1.4rem;
font-weight:700;
color:#6a1b9a;
margin-bottom:10px;
}

.tool-desc{
font-size:0.9rem;
color:#666;
margin-bottom:20px;
}

/* TEXT AREA */

textarea{
width:100%;
height:140px;
border-radius:12px;
border:1px solid #ddd;
padding:12px;
font-size:1rem;
font-family:'Cairo';
resize:none;
outline:none;
}

textarea:focus{
border-color:#6a1b9a;
}

/* BUTTONS */

.buttons{
display:flex;
gap:10px;
margin-top:20px;
flex-wrap:wrap;
}

.btn{
border:none;
padding:12px 20px;
border-radius:25px;
font-weight:600;
cursor:pointer;
transition:0.25s;
font-size:0.9rem;
}

.listen{
background:#6a1b9a;
color:white;
}

.listen:hover{
background:#4a0d7a;
}

.convert{
background:#009688;
color:white;
}

.convert:hover{
background:#00796b;
}

/* AUDIO PLAYER */

.player-box{
margin-top:25px;
padding:15px;
background:#fafafa;
border-radius:12px;
border:1px solid #eee;
}

audio{
width:100%;
}

/* FOOTER */

footer{
background:#6a1b9a;
color:white;
text-align:center;
padding:18px;
font-size:0.9rem;
}

</style>
</head>

<body>

<header>
<h1>AI Voice</h1>
<p>حوّل النص إلى صوت طبيعي بسرعة</p>
</header>

<div class="main">

<div class="voice-card">

<div class="tool-title">تحويل النص إلى صوت</div>
<div class="tool-desc">
اكتب النص الذي تريد تحويله وسيتم قراءته بصوت امرأة.
</div>

<textarea id="textInput" placeholder="اكتب النص هنا..."></textarea>

<div class="buttons">
<button class="btn listen" onclick="listenVoice()">🔊 سمع</button>
<button class="btn convert" onclick="convertAudio()">🎧 تحويل إلى Audio</button>
</div>

<div class="player-box">
<audio id="audioPlayer" controls></audio>
</div>

</div>

</div>

<footer>
&copy; 2026 CreatorHub. جميع الحقوق محفوظة.
</footer>

<script>

function getArabicVoice(){

const voices = speechSynthesis.getVoices();
return voices.find(v => v.lang.includes("ar")) || voices[0];

}

/* تشغيل الصوت فقط */

function listenVoice(){

const text=document.getElementById("textInput").value;

if(!text){
alert("اكتب النص أولاً");
return;
}

let utterance = new SpeechSynthesisUtterance(text);
utterance.lang="ar-SA";

const voice=getArabicVoice();
if(voice) utterance.voice=voice;

speechSynthesis.cancel();
speechSynthesis.speak(utterance);

}

/* تحويل إلى صوت في المشغل */

function convertAudio(){

const text=document.getElementById("textInput").value;

if(!text){
alert("اكتب النص أولاً");
return;
}

let utterance = new SpeechSynthesisUtterance(text);
utterance.lang="ar-SA";

const voice=getArabicVoice();
if(voice) utterance.voice=voice;

speechSynthesis.cancel();
speechSynthesis.speak(utterance);

const audio=document.getElementById("audioPlayer");

/* حيلة بسيطة لإنشاء ملف صوتي */

const blob=new Blob([text],{type:"audio/wav"});
const url=URL.createObjectURL(blob);

audio.src=url;

}

</script>

</body>
</html>
