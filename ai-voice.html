<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>AI Voice</title>
</head>

<body style="text-align:center;font-family:Arial">

<h2>AI Voice</h2>

<textarea id="text" rows="5" cols="40" placeholder="اكتب النص هنا"></textarea>

<br><br>

<select id="voiceType">
<option value="man">رجل</option>
<option value="woman">امرأة</option>
<option value="girl">بنت صغيرة</option>
<option value="boy">ولد صغير</option>
<option value="chipmunk">سنجاب</option>
</select>

<br><br>

<label>السرعة</label><br>
<input type="range" id="speed" min="0.5" max="2" step="0.1" value="1">

<br><br>

<button onclick="speak()">تشغيل</button>

<script>

function speak(){

let text = document.getElementById("text").value;
let type = document.getElementById("voiceType").value;
let speed = document.getElementById("speed").value;

let speech = new SpeechSynthesisUtterance(text);

speech.lang = "ar-SA"; // العربية

if(type=="man"){
speech.pitch = 0.7;
speech.rate = speed;
}

if(type=="woman"){
speech.pitch = 1.2;
speech.rate = speed;
}

if(type=="girl"){
speech.pitch = 1.8;
speech.rate = speed;
}

if(type=="boy"){
speech.pitch = 1.4;
speech.rate = speed;
}

if(type=="chipmunk"){
speech.pitch = 2;
speech.rate = 1.6;
}

speechSynthesis.speak(speech);

}

</script>

</body>
</html>
